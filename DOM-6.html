<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
</head>
<body>
    <h1 id="msg">Check Voting Eligibility</h1>
    <button onclick="Voting()">Check Eligibility</button>
    
    <script>
        function Voting(){
            let age ="";
            age=Number(prompt("Enter your age:"));
            if(age>=18){
                age="You are eligible to vote!";
            }else{
                age="You are not eligible to vote!";
            }
            document.getElementById("msg").innerHTML=age;
        }
    </script>
</body>
