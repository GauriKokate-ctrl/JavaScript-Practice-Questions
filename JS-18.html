#Use prompt to take marks and display results.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
           <button onclick="Marks()">
    Click ME
   </button>
    <script>
        function Marks(){
        let marks=Number(prompt("Enter your marks:"));
        if(marks>=35){
            alert("You are Pass!");
         }else{
            alert("You are Fail!");
            }    
        }
    </script>
</body>
</html>
